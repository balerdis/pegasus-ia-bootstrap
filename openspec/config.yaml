schema: spec-driven

context: |
  Project: Pegasus IA bootstrap
  Purpose: reusable bootstrap that configures a VS Code/Copilot-first Pegasus IA harness/workspace for exercises and demos
  Architecture: local-first filesystem bootstrap that writes harness templates into a target workspace and optionally installs global VS Code/Copilot assets or legacy Cursor user rules behind explicit flags
  Stack: Python 3 CLI bootstrap script plus Bash smoke verification; no package manifest or framework scaffold
  Testing: bash tests/smoke.sh covers CLI help, dry-run, Copilot-first layout, conflict, force, no Git metadata, banned generated references, optional global Copilot Stable/Insiders install paths, settings backups/merge, and legacy Cursor planning/install paths
  Target workspace default path: /var/www/html/personal/<project-name>
  Persistence mode: hybrid
  Artifact language: English by default; only an explicit user instruction naming the desired artifact language overrides this default
  Memory language: durable Pegasus Memory descriptive prose is always English, independent of chat or artifact language

rules:
  language:
    - Generate all agent-consumed artifacts, prompts, instructions, workflows, skills, and internal agent communication in English unless the user explicitly names another language for the artifact
    - Do not infer artifact language from chat, persona, source language, or prior artifacts
    - Preserve immutable or exact source data without translation and label persisted artifact references with `Artifact language: <language>`
    - Keep durable Pegasus Memory descriptive prose in English
  proposal:
    - Keep scope small and reversible
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHOULD, MAY)
  design:
    - Document decisions with rationale
    - Delegate design to fresh-context sdd-design; the orchestrator validates completeness and reproduces the specialist result envelope verbatim or field-for-field
    - Require per-entry traceability for flow, alternatives, affected areas, testing, rollout/rollback, and risks
    - Require specialist-owned coverage of every approved proposal risk in design risks and applicable testing or explicit N/A rationale
  tasks:
    - Keep tasks small and session-completable
  apply:
    - Follow existing conventions once detected
  verify:
    - Record commands used for validation
  archive:
    - Preserve lineage before closing a change

testing:
  strict_tdd: false
  detected: "2026-06-24"
  runner: null
  framework: null
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality:
    linter: false
    type_checker: false
    formatter: false
