schema: spec-driven

context: |
  Project: Pegasus IA bootstrap
  Purpose: reusable bootstrap that configures a Cursor harness/workspace for Pegasus IA exercises and demos
  Architecture: local-first filesystem bootstrap that writes harness templates into a target workspace and optionally installs global Cursor user rules behind an explicit flag
  Stack: Python 3 CLI bootstrap script plus Bash smoke verification; no package manifest or framework scaffold
  Testing: bash tests/smoke.sh covers CLI help, dry-run, conflict, force, and optional global-rule planning/install paths
  Target workspace default path: /var/www/html/personal/<project-name>
  Persistence mode: hybrid

rules:
  proposal:
    - Keep scope small and reversible
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHOULD, MAY)
  design:
    - Document decisions with rationale
  tasks:
    - Keep tasks small and session-completable
  apply:
    - Follow existing conventions once detected
  verify:
    - Record commands used for validation
  archive:
    - Preserve lineage before closing a change

testing:
  strict_tdd: false
  detected: "2026-06-24"
  runner: null
  framework: null
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality:
    linter: false
    type_checker: false
    formatter: false
